# /etc/apache2/sites-available/convoyage.conf

<VirtualHost *:80>
    ServerName convoyage.example.com
    ServerAdmin webmaster@convoyage.com

    # Frontend React (fichiers statiques compilés)
    DocumentRoot /var/www/convoyage/frontend/build

    <Directory /var/www/convoyage/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # React Router — redirige toutes les routes vers index.html
    <Directory /var/www/convoyage/frontend/build>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Reverse Proxy vers Flask API
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:5000/api/
    ProxyPassReverse /api/ http://127.0.0.1:5000/api/

    # Headers CORS (si nécessaire)
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type"

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/convoyage_error.log
    CustomLog ${APACHE_LOG_DIR}/convoyage_access.log combined
</VirtualHost>

